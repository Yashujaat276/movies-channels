<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <title>🎬 MOVIES CHANNELS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: white; font-family: Arial; padding: 15px; }
    .container { max-width: 1400px; margin: 0 auto; }
    h1 { color: #ff6b6b; text-align: center; margin: 20px 0; }
    .player-container { margin-bottom: 30px; background: #000; border-radius: 10px; overflow: hidden; position: sticky; top: 0; }
    video { width: 100%; max-height: 400px; }
    .category { background: #1a1a1a; border-radius: 10px; padding: 20px; margin-bottom: 25px; }
    .category h2 { color: #4ecdc4; margin-bottom: 15px; }
    .channel-grid { display: flex; flex-wrap: wrap; gap: 10px; }
    .channel-btn { background: #2a2a2a; color: white; padding: 12px 20px; border-radius: 5px; cursor: pointer; min-width: 150px; border: 1px solid #444; }
    .channel-btn:hover { background: #e74c3c; }
    .status { background: #27ae60; color: white; padding: 10px; border-radius: 5px; margin: 10px 0; display: none; text-align: center; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎬 MOVIES CHANNELS</h1>
    <div class="status" id="statusMsg"></div>
    <div class="player-container"><video id="videoPlayer" controls autoplay></video></div>
    <div class="category">
      <h2>🎥 ALL MOVIES CHANNELS</h2>
      <div class="channel-grid" id="movies"></div>
    </div>
  </div>

  <script>
    // 🔥 Tumhara personal proxy + backup public proxies
    const PROXY = 'https://indian-channels.yashkumar20800.workers.dev/?url=';  // Tumhara worker
      'https://corsproxy.io/?',                                 // Backup 1
      'https://api.allorigins.win/raw?url=',                    // Backup 2
      'https://thingproxy.freeboard.io/fetch/'                  // Backup 3
    ];

    // 📺 Working movies channels
    const moviesChannels = [
      { name: "🎬 B4U Movies", url: "https://amg00877-b4unew-amg00877c2-lg-in-5260.playouts.now.amagi.tv/playlist.m3u8" },
      { name: "🎬 B4U Kadak", url: "https://amg00877-b4unew-amg00877c4-lg-in-5452.playouts.now.amagi.tv/playlist.m3u8" },
      { name: "🎬 B4U Music", url: "https://cdnb4u.wiseplayout.com/B4U_Music/master.m3u8" },
      { name: "🎬 Dangal TV", url: "https://live-dangal.akamaized.net/liveabr/playlist.m3u8" },
      { name: "🎬 Dangal 2", url: "https://live-dangal2.akamaized.net/liveabr/playlist.m3u8" },
      { name: "🎬 Sony Max", url: "http://cors.tundracast.com:2000/https://streamer2.nexgen.bz/SONYMAX/index.m3u8" },
      { name: "🎬 Star Gold HD", url: "http://103.229.254.25:7001/play/a0dd/index.m3u8" }
    ];

    let currentProxyIndex = 0;
    let currentChannelUrl = '';

    window.onload = function() {
      const container = document.getElementById('movies');
      moviesChannels.forEach(channel => {
        const btn = document.createElement('button');
        btn.className = 'channel-btn';
        btn.textContent = channel.name;
        btn.onclick = () => playChannel(channel.url);
        container.appendChild(btn);
      });
    };

    function playChannel(url) {
      currentChannelUrl = url;
      currentProxyIndex = 0;
      tryNextProxy();
    }

    function tryNextProxy() {
      if (currentProxyIndex >= PROXIES.length) {
        document.getElementById('statusMsg').innerHTML = '❌ All proxies failed';
        return;
      }

      const proxy = PROXIES[currentProxyIndex];
      document.getElementById('statusMsg').style.display = 'block';
      document.getElementById('statusMsg').innerHTML = `⏳ Trying proxy ${currentProxyIndex + 1}...`;

      const proxyUrl = proxy + encodeURIComponent(currentChannelUrl);
      loadWithProxy(proxyUrl);
    }

    function loadWithProxy(proxyUrl) {
      const video = document.getElementById('videoPlayer');
      
      if (window.hls) window.hls.destroy();
      
      window.hls = new Hls({
        xhrSetup: function(xhr) {
          xhr.setRequestHeader('Referer', 'https://www.google.com/');
          xhr.setRequestHeader('User-Agent', 'Mozilla/5.0');
        }
      });
      
      window.hls.loadSource(proxyUrl);
      window.hls.attachMedia(video);
      
      window.hls.on(Hls.Events.MANIFEST_PARSED, () => {
        document.getElementById('statusMsg').innerHTML = '✅ Now Playing';
        setTimeout(() => document.getElementById('statusMsg').style.display = 'none', 3000);
      });
      
      window.hls.on(Hls.Events.ERROR, () => {
        currentProxyIndex++;
        tryNextProxy();
      });
    }
  </script>
</body>
</html>
